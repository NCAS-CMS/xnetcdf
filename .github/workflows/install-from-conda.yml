name: Install from conda-forge
permissions: {}
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"

# Required shell entrypoint to have properly configured bash shell
defaults:
  run:
    shell: bash -l {0}

jobs:
  linux:
    runs-on: "ubuntu-latest"
    if: github.repository == 'NCAS-CMS/xnetcdf' # avoid GAs in forks
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      # fail-fast set to False allows all other tests
      # in the workflow to run regardless of any fail
      fail-fast: false
    name: Linux Python ${{ matrix.python-version }}
    steps:
      - uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
        with:
          python-version: ${{ matrix.python-version }}
          miniforge-version: "latest"
          use-mamba: true
      - name: Record versions
        run: |
          mamba --version
          which conda
          which mamba
          python -V
      - name: Install xnetcdf
        run: mamba install xnetcdf
      - name: Verify installation
        run: |
          python -c "import xnetcdf"
      - name: Check environment contents
        run: |
          conda list
          pip list
      - name: Test p5dump
        run: |
          which p5dump
          p5dump -h 
